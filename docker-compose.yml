services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: locadora_app
    restart: unless-stopped
    volumes:
      - .:/var/www
      - /var/www/vendor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - locadora_network

  nginx:
    image: nginx:alpine
    container_name: locadora_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - locadora_network

  mysql:
    image: mysql:latest
    container_name: locadora_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: app_locadora_carros
      MYSQL_USER: locadora
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - locadora_network

  redis:
    image: redis:alpine
    container_name: locadora_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - locadora_network

volumes:
  mysql_data:
  redis_data:

networks:
  locadora_network:
    name: locadora_network
    driver: bridge
